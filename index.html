<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Redirect</title>
</head>
<body>
  <script>
    (function () {
      const DEFAULT_HOST = "auth.nordicapigateway.com";
      const params = new URLSearchParams(window.location.search);

      const rawHost = params.get("host");              // what the caller provided (may be null)
      const host = (rawHost || DEFAULT_HOST).trim();   // what we'll actually try to use
      const code = params.get("code") || "123";

      const isValid = /^[a-z0-9.-]+\.nordicapigateway\.com$/i.test(host);

      if (!isValid) {
        // Log useful diagnostics
        console.error("Invalid host parameter for redirect:", {
          rawHost,                         // original input
          resolvedHost: host,              // after default/trim
          fullQuery: window.location.search,
          pageUrl: window.location.href
        });

        // Also show it on the page (helpful on mobile / when console isn't available)
        document.body.innerHTML =
          "<h3>Invalid host parameter</h3>" +
          "<p><b>Provided host:</b> " + String(rawHost) + "</p>" +
          "<p><b>Resolved host:</b> " + String(host) + "</p>" +
          "<p><b>Query string:</b> " + String(window.location.search) + "</p>";
        return;
      }

      const url = `https://${host}/stage-routing/callback?code=${encodeURIComponent(code)}`;
      window.location.replace(url);
    })();
  </script>
</body>
</html>
